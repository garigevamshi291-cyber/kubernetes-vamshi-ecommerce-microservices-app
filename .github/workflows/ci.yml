name: CI/CD for Shopping Site (Frontend + Backend)

on:
  workflow_dispatch:

  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

  FRONTEND_SERVICES: "main appliances auto beauty books computers earphones electronics fashion food furniture googlegrocery googlemusic googlepay home mobiles sports toys two-wheelers"

permissions:
  contents: write

jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------
      # Checkout Repository
      # -----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}

      # -----------------------------------
      # Configure AWS Credentials
      # -----------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------
      # Login to Amazon ECR
      # -----------------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -----------------------------------
      # Build and Push Frontend Images
      # -----------------------------------
      - name: Build and Push Frontend Images
        run: |
          set -e

          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)

          for service in $FRONTEND_SERVICES; do

            FOLDER="frontend/$service"
            REPO_NAME="shopping-site-$service"

            IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

            echo "======================================"
            echo "Building frontend service: $service"
            echo "======================================"

            # Check Dockerfile
            if [ ! -f "$FOLDER/Dockerfile" ]; then
              echo "Dockerfile not found in $FOLDER"
              continue
            fi

            # Check deployment.yml
            if [ ! -f "$FOLDER/deployment.yml" ]; then
              echo "deployment.yml not found in $FOLDER"
              continue
            fi

            # Create ECR Repo if not exists
            aws ecr describe-repositories \
              --repository-names $REPO_NAME \
              --region $AWS_REGION >/dev/null 2>&1 || \

            aws ecr create-repository \
              --repository-name $REPO_NAME \
              --region $AWS_REGION

            # Build Docker Image
            docker build -t $IMAGE_URI $FOLDER

            # Push Docker Image
            docker push $IMAGE_URI

            # Update deployment.yml image tag
            sed -i "s|image:.*|image: $IMAGE_URI|g" "$FOLDER/deployment.yml"

            echo "Updated deployment.yml for $service"
            cat "$FOLDER/deployment.yml"

          done

      # -----------------------------------
      # Build and Push Backend Image
      # -----------------------------------
      - name: Build and Push Backend Image
        run: |
          set -e

          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)

          FOLDER="backend"
          REPO_NAME="shopping-site-backend"

          IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

          echo "======================================"
          echo "Building backend service"
          echo "======================================"

          # Create ECR Repo if not exists
          aws ecr describe-repositories \
            --repository-names $REPO_NAME \
            --region $AWS_REGION >/dev/null 2>&1 || \

          aws ecr create-repository \
            --repository-name $REPO_NAME \
            --region $AWS_REGION

          # Build Docker Image
          docker build -t $IMAGE_URI $FOLDER

          # Push Docker Image
          docker push $IMAGE_URI

          # Update backend deployment file
          sed -i "s|image:.*|image: $IMAGE_URI|g" "$FOLDER/backend-deployment.yml"

          echo "Updated backend deployment file"
          cat "$FOLDER/backend-deployment.yml"

      # -----------------------------------
      # Commit Updated YAML Files
      # -----------------------------------
      - name: Commit updated deployment files
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add frontend/**/deployment.yml
          git add backend/backend-deployment.yml

          git commit -m "Update image tags [skip ci]" || echo "No changes to commit"

          git push origin main || echo "Nothing to push"
